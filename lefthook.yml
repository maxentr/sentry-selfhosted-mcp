pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      glob: "*.{js,ts,mjs,cjs,json}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: pnpm run build
